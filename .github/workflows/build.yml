name: Violet Music CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: |
          cd backend
          npm install
      - name: Lint (Optional)
        run: |
          cd backend
          # npm run lint (Add this if you have a linting script)

  flutter_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Get dependencies
        run: |
          cd mobile
          flutter pub get
      - name: Build Debug APK
        run: |
          cd mobile
          flutter build apk --debug
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: debug-apk
          path: mobile/build/app/outputs/flutter-apk/app-debug.apk
